<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>习概背诵助手</title>
  <style>
    :root {
      --paper: #ffffff;
      --panel: #fbf7f0;
      --panel-warm: #f1e6da;
      --ink: #27231f;
      --muted: #6b625a;
      --soft: #8b8177;
      --clay: #a45f43;
      --clay-dark: #7c3f2e;
      --rule: #d8cab9;
      --rule-soft: #eadfd2;
      --ok: #3f7454;
      --warn: #a16a21;
      --bad: #a44438;
      --shadow: 0 18px 50px rgba(39, 35, 31, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: ui-serif, "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      line-height: 1.65;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 350px) minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--rule-soft);
      background: #fff;
      padding: 24px 20px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border: 1px solid var(--rule);
      background: var(--panel);
      color: var(--clay-dark);
      display: grid;
      place-items: center;
      font: 700 18px/1 ui-sans-serif, system-ui, sans-serif;
    }

    .brand h1 {
      margin: 0;
      font: 800 22px/1.15 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      margin-bottom: 14px;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--rule);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }

    .search input:focus {
      border-color: var(--clay);
      box-shadow: 0 0 0 3px rgba(164, 95, 67, 0.12);
    }

    .filters,
    .quick-actions,
    .grade-row,
    .answer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filters {
      margin-bottom: 16px;
    }

    .chip,
    .icon-btn,
    .grade-btn {
      border: 1px solid var(--rule);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      min-height: 38px;
    }

    .chip {
      font: 650 13px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .chip.active,
    .icon-btn.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .quick-actions {
      margin: 0 0 18px;
    }

    .icon-btn {
      font: 650 13px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .icon-btn:hover,
    .chip:hover,
    .grade-btn:hover {
      border-color: var(--clay);
    }

    .sidebar-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0 18px;
    }

    .stat {
      border: 1px solid var(--rule-soft);
      background: var(--panel);
      padding: 10px;
    }

    .stat strong {
      display: block;
      font: 800 20px/1 ui-sans-serif, system-ui, sans-serif;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .topic-list {
      display: grid;
      gap: 10px;
    }

    .topic {
      border-top: 1px solid var(--rule-soft);
      padding-top: 12px;
    }

    .topic-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font: 800 14px/1.35 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .topic-title small {
      color: var(--muted);
      white-space: nowrap;
    }

    .question-link {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      padding: 8px 6px;
      text-align: left;
    }

    .question-link:hover {
      background: var(--panel);
    }

    .question-link.active {
      background: var(--panel-warm);
    }

    .q-num {
      color: var(--clay-dark);
      font-weight: 800;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .q-title {
      min-width: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .key-tag,
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--rule);
      padding: 2px 6px;
      color: var(--clay-dark);
      background: #fff;
      font: 800 12px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      white-space: nowrap;
    }

    .status-pill.known {
      color: var(--ok);
      border-color: rgba(63, 116, 84, .35);
    }

    .status-pill.fuzzy {
      color: var(--warn);
      border-color: rgba(161, 106, 33, .35);
    }

    .status-pill.unknown {
      color: var(--bad);
      border-color: rgba(164, 68, 56, .35);
    }

    .main {
      min-width: 0;
      padding: 30px clamp(22px, 5vw, 64px) 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--rule-soft);
      padding-bottom: 16px;
      margin-bottom: 28px;
    }

    .topbar-title {
      color: var(--muted);
      font: 650 14px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .progress-wrap {
      min-width: 220px;
      max-width: 360px;
      flex: 1;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 8px;
      background: var(--panel);
      border: 1px solid var(--rule-soft);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--clay);
      transition: width .2s ease;
    }

    .study-card {
      max-width: 980px;
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--muted);
      font: 750 14px/1.4 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      margin-bottom: 10px;
    }

    .question-heading {
      margin: 0;
      color: var(--clay-dark);
      font: 850 clamp(24px, 4vw, 38px)/1.25 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      letter-spacing: 0;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 18px 0 16px;
      color: var(--muted);
      font: 650 14px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .source-chip {
      border: 1px solid var(--rule);
      background: var(--panel);
      color: var(--muted);
      padding: 8px 10px;
    }

    .recall-box {
      border: 1px solid var(--rule);
      background: var(--panel-warm);
      padding: 16px;
      margin: 18px 0;
    }

    .recall-box textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--rule);
      background: #fff;
      color: var(--ink);
      padding: 12px;
      outline: none;
    }

    .recall-box textarea:focus {
      border-color: var(--clay);
      box-shadow: 0 0 0 3px rgba(164, 95, 67, 0.12);
    }

    .recall-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font: 700 13px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .answer-panel {
      border: 1px solid var(--rule);
      background: var(--panel);
      box-shadow: var(--shadow);
      margin-top: 18px;
    }

    .answer-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      padding: 14px 16px;
    }

    .answer-count {
      color: var(--muted);
      font: 650 13px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .answers {
      list-style: none;
      margin: 0;
      padding: 10px 16px 16px;
      counter-reset: answer;
    }

    .answers li {
      counter-increment: answer;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      padding: 13px 0;
      border-bottom: 1px solid var(--rule-soft);
    }

    .answers li:last-child {
      border-bottom: 0;
    }

    .answers li::before {
      content: counter(answer) ".";
      color: var(--clay-dark);
      font: 800 16px/1.7 ui-sans-serif, system-ui, sans-serif;
    }

    .answer-text {
      font-size: 18px;
    }

    .answers li.hidden-answer .answer-text {
      color: var(--soft);
      font-family: ui-sans-serif, system-ui, "PingFang SC", sans-serif;
      font-size: 15px;
    }

    .answers li.hidden-answer .answer-text button {
      border: 1px dashed var(--rule);
      background: #fff;
      color: var(--muted);
      padding: 8px 10px;
      width: 100%;
      text-align: left;
    }

    .grade-card {
      margin-top: 18px;
      border-top: 1px solid var(--rule-soft);
      padding-top: 16px;
    }

    .grade-row {
      margin-top: 10px;
    }

    .grade-btn {
      font: 750 14px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .grade-btn.known.active {
      background: rgba(63, 116, 84, .1);
      border-color: var(--ok);
      color: var(--ok);
    }

    .grade-btn.fuzzy.active {
      background: rgba(161, 106, 33, .1);
      border-color: var(--warn);
      color: var(--warn);
    }

    .grade-btn.unknown.active {
      background: rgba(164, 68, 56, .1);
      border-color: var(--bad);
      color: var(--bad);
    }

    .empty-state {
      max-width: 720px;
      margin: 12vh auto 0;
      border: 1px solid var(--rule);
      background: var(--panel);
      padding: 28px;
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font: 850 28px/1.2 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .empty-state p {
      margin: 0;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: var(--ink);
      color: #fff;
      padding: 10px 12px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
      font: 650 13px/1.3 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--rule-soft);
      }

      .main {
        padding: 22px 18px 42px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .progress-wrap {
        width: 100%;
        max-width: none;
      }

      .question-heading {
        font-size: 26px;
      }

      .answer-text {
        font-size: 17px;
      }
    }

    @media print {

      .sidebar,
      .topbar,
      .quick-actions,
      .answer-toolbar,
      .recall-box,
      .grade-card,
      .toast {
        display: none !important;
      }

      .app {
        display: block;
      }

      .main {
        padding: 0;
      }

      .study-card {
        max-width: none;
      }

      .answer-panel {
        box-shadow: none;
      }

      .answers li.hidden-answer .answer-text {
        color: var(--ink);
        font-family: inherit;
        font-size: 16px;
      }

      .answers li.hidden-answer .answer-text button {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">习</div>
        <div>
          <h1>习概背诵助手</h1>
          <p>10 个专题 · 26 道题 · 185 条原句</p>
        </div>
      </div>
      <div class="search"><input id="searchInput" type="search" placeholder="搜索题目、专题或答案关键词"></div>
      <div class="filters" role="group" aria-label="筛选题目">
        <button class="chip active" type="button" data-filter="all">全部</button>
        <button class="chip" type="button" data-filter="key">重点</button>
        <button class="chip" type="button" data-filter="weak">薄弱</button>
        <button class="chip" type="button" data-filter="unknown">不会</button>
      </div>
      <div class="quick-actions">
        <button class="icon-btn primary" type="button" id="randomAll">随机</button>
        <button class="icon-btn" type="button" id="randomKey">抽重点</button>
        <button class="icon-btn" type="button" id="randomWeak">抽薄弱</button>
        <button class="icon-btn" type="button" id="printBtn">打印</button>
        <button class="icon-btn" type="button" id="resetBtn">重置</button>
      </div>
      <div class="sidebar-stats">
        <div class="stat"><strong id="statKnown">0</strong><span>会了</span></div>
        <div class="stat"><strong id="statFuzzy">0</strong><span>模糊</span></div>
        <div class="stat"><strong id="statUnknown">0</strong><span>不会</span></div>
      </div>
      <div id="topicList" class="topic-list"></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-title">先背题目，再逐条展开教材原句对照。</div>
        <div class="progress-wrap">
          <div class="progress-label"><span>完成进度 <strong id="progressText">0/0</strong></span><span
              id="progressPct">0%</span></div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </div>
      <article id="studyCard" class="study-card"></article>
    </main>
  </div>
  <div id="toast" class="toast"></div>

    const STORE_KEY = "xigai-recite-state-v1";
    const flatQuestions = DATA.flatMap(topic => topic.questions.map(q => ({ ...q, topicTitle: topic.title, topicNumber: topic.number, topicKey: topic.key })));
    let state = loadState();
    let selectedId = state.lastSelected || flatQuestions[0]?.id;
    let filter = "all";
    let query = "";
    let revealed = 0;

    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { grades: {}, notes: {} }; }
      catch { return { grades: {}, notes: {} }; }
    }
    function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    function gradeLabel(g) { return g === "known" ? "会了" : g === "fuzzy" ? "模糊" : g === "unknown" ? "不会" : "未标"; }
    function statusClass(g) { return g || "none"; }
    function toast(text) {
      const el = $("#toast");
      el.textContent = text;
      el.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove("show"), 1400);
    }
    function filteredQuestions() {
      const q = query.trim().toLowerCase();
      return flatQuestions.filter(item => {
        const g = state.grades[item.id];
        if (filter === "key" && !(item.key || item.topicKey)) return false;
        if (filter === "weak" && !(g === "unknown" || g === "fuzzy")) return false;
        if (filter === "unknown" && g !== "unknown") return false;
        if (q) {
          const hay = [item.title, item.topicTitle, item.number, item.pages, ...item.answers].join(" ").toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
    }
    function renderStats() {
      const total = flatQuestions.length;
      const known = flatQuestions.filter(q => state.grades[q.id] === "known").length;
      const fuzzy = flatQuestions.filter(q => state.grades[q.id] === "fuzzy").length;
      const unknown = flatQuestions.filter(q => state.grades[q.id] === "unknown").length;
      const pct = total ? Math.round(known / total * 100) : 0;
      $("#statKnown").textContent = known;
      $("#statFuzzy").textContent = fuzzy;
      $("#statUnknown").textContent = unknown;
      $("#progressText").textContent = `${known}/${total}`;
      $("#progressPct").textContent = `${pct}%`;
      $("#progressFill").style.width = `${pct}%`;
    }
    function renderSidebar() {
      const allowed = new Set(filteredQuestions().map(q => q.id));
      const list = $("#topicList");
      list.innerHTML = "";
      DATA.forEach(topic => {
        const qs = topic.questions.filter(q => allowed.has(q.id));
        if (!qs.length) return;
        const topicEl = document.createElement("section");
        topicEl.className = "topic";
        const title = document.createElement("div");
        title.className = "topic-title";
        title.innerHTML = `<span>${topic.number}. ${escapeHtml(topic.title)} ${topic.key ? '<span class="key-tag">重点</span>' : ''}</span><small>${qs.length}题</small>`;
        topicEl.appendChild(title);
        qs.forEach(q => {
          const grade = state.grades[q.id];
          const btn = document.createElement("button");
          btn.className = `question-link ${q.id === selectedId ? "active" : ""}`;
          btn.type = "button";
          btn.innerHTML = `<span class="q-num">${escapeHtml(q.number)}</span><span class="q-title">${escapeHtml(q.title)} ${(q.key || topic.key) ? '<span class="key-tag">重点</span>' : ''}</span><span class="status-pill ${statusClass(grade)}">${gradeLabel(grade)}</span>`;
          btn.addEventListener("click", () => selectQuestion(q.id));
          topicEl.appendChild(btn);
        });
        list.appendChild(topicEl);
      });
      if (!list.children.length) {
        list.innerHTML = `<div class="empty-state" style="margin:0;padding:16px"><h2 style="font-size:18px">没有匹配题目</h2><p>换个关键词或筛选条件。</p></div>`;
      }
    }
    function selectQuestion(id) {
      selectedId = id;
      revealed = 0;
      state.lastSelected = id;
      saveState();
      render();
      if (window.matchMedia("(max-width: 900px)").matches) document.querySelector(".main").scrollIntoView({ block: "start" });
    }
    function currentQuestion() { return flatQuestions.find(q => q.id === selectedId) || flatQuestions[0]; }
    function renderMain() {
      const q = currentQuestion();
      const main = $("#studyCard");
      if (!q) {
        main.innerHTML = `<div class="empty-state"><h2>暂无题目</h2><p>没有从提纲中读取到题目。</p></div>`;
        return;
      }
      const grade = state.grades[q.id];
      const note = state.notes[q.id] || "";
      main.innerHTML = `
    <div class="eyebrow">专题${toChineseNumber(q.topicNumber)} · ${escapeHtml(q.topicTitle)} ${(q.key || q.topicKey) ? '<span class="key-tag">重点</span>' : ''}</div>
    <h2 class="question-heading"><span style="color:var(--clay)">${escapeHtml(q.number)}</span>&nbsp; ${escapeHtml(q.title)}</h2>
    <div class="meta-row">
      <span class="source-chip">教材出处：第 ${escapeHtml(q.pages)} 页</span>
      <span class="status-pill ${statusClass(grade)}">${gradeLabel(grade)}</span>
      <span class="source-chip">${q.answers.length} 条原句</span>
    </div>
    <section class="recall-box">
      <div class="recall-head"><span>默写区</span><button type="button" class="icon-btn" id="clearNoteBtn">清空</button></div>
      <textarea id="noteArea" placeholder="先在这里默写答案，再展开原文对照。">${escapeHtml(note)}</textarea>
    </section>
    <section class="answer-panel">
      <div class="answer-toolbar">
        <span class="answer-count">已显示 ${Math.min(revealed, q.answers.length)} / ${q.answers.length}</span>
        <div class="answer-actions">
          <button type="button" class="icon-btn primary" id="nextBtn">显示下一条</button>
          <button type="button" class="icon-btn" id="showAllBtn">全部显示</button>
          <button type="button" class="icon-btn" id="hideAllBtn">全部隐藏</button>
        </div>
      </div>
      <ol class="answers">
        ${q.answers.map((ans, i) => i < revealed ? `<li><div class="answer-text">${escapeHtml(ans)}</div></li>` : `<li class="hidden-answer"><div class="answer-text"><button type="button" data-reveal="${i}">显示第 ${i + 1} 条原句</button></div></li>`).join("")}
      </ol>
    </section>
    <section class="grade-card">
      <div class="eyebrow">熟练度</div>
      <div class="grade-row">
        <button type="button" class="grade-btn known ${grade === 'known' ? 'active' : ''}" data-grade="known">会了</button>
        <button type="button" class="grade-btn fuzzy ${grade === 'fuzzy' ? 'active' : ''}" data-grade="fuzzy">模糊</button>
        <button type="button" class="grade-btn unknown ${grade === 'unknown' ? 'active' : ''}" data-grade="unknown">不会</button>
      </div>
    </section>
  `;
      $("#noteArea").addEventListener("input", e => { state.notes[q.id] = e.target.value; saveState(); });
      $("#clearNoteBtn").addEventListener("click", () => { state.notes[q.id] = ""; saveState(); renderMain(); toast("默写区已清空"); });
      $("#nextBtn").addEventListener("click", () => { revealed = Math.min(q.answers.length, revealed + 1); renderMain(); });
      $("#showAllBtn").addEventListener("click", () => { revealed = q.answers.length; renderMain(); });
      $("#hideAllBtn").addEventListener("click", () => { revealed = 0; renderMain(); });
      $$('[data-reveal]').forEach(btn => btn.addEventListener("click", e => { revealed = Math.max(revealed, Number(e.currentTarget.dataset.reveal) + 1); renderMain(); }));
      $$('[data-grade]').forEach(btn => btn.addEventListener("click", e => {
        state.grades[q.id] = e.currentTarget.dataset.grade;
        saveState();
        render();
        toast(`已标记：${gradeLabel(state.grades[q.id])}`);
      }));
    }
    function randomPick(mode) {
      let pool = flatQuestions;
      if (mode === "key") pool = flatQuestions.filter(q => q.key || q.topicKey);
      if (mode === "weak") pool = flatQuestions.filter(q => ["unknown", "fuzzy"].includes(state.grades[q.id]));
      if (!pool.length) { toast("当前没有可抽题目"); return; }
      const q = pool[Math.floor(Math.random() * pool.length)];
      selectQuestion(q.id);
      toast("已随机抽题");
    }
    function resetProgress() {
      if (!confirm("确定清空熟练度和默写记录吗？")) return;
      state = { grades: {}, notes: {}, lastSelected: selectedId };
      saveState();
      render();
      toast("进度已清空");
    }
    function render() { renderStats(); renderSidebar(); renderMain(); }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch]));
    }
    function toChineseNumber(n) {
      return ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"][n] || n;
    }
    function init() {
      $("#searchInput").addEventListener("input", e => { query = e.target.value; renderSidebar(); });
      $$('[data-filter]').forEach(btn => btn.addEventListener("click", e => {
        filter = e.currentTarget.dataset.filter;
        $$('[data-filter]').forEach(b => b.classList.toggle("active", b.dataset.filter === filter));
        renderSidebar();
      }));
      $("#randomAll").addEventListener("click", () => randomPick("all"));
      $("#randomKey").addEventListener("click", () => randomPick("key"));
      $("#randomWeak").addEventListener("click", () => randomPick("weak"));
      $("#printBtn").addEventListener("click", () => window.print());
      $("#resetBtn").addEventListener("click", resetProgress);
      render();
    }
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>

</html>
