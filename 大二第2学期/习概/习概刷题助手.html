<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>习概刷题助手</title>
    <style>
        :root {
            --paper: #fff;
            --panel: #fbf7f0;
            --warm: #f1e6da;
            --ink: #27231f;
            --muted: #6b625a;
            --clay: #a45f43;
            --clay-dark: #7c3f2e;
            --rule: #d8cab9;
            --soft: #eadfd2;
            --ok: #3f7454;
            --bad: #a44438;
            --warn: #a16a21;
            --shadow: 0 18px 50px rgba(39, 35, 31, .08)
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: ui-serif, "Songti SC", "STSong", serif;
            line-height: 1.62
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr)
        }

        button,
        input {
            font: inherit
        }

        button {
            cursor: pointer
        }

        .side {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
            border-right: 1px solid var(--soft);
            padding: 24px 20px;
            background: #fff
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px
        }

        .mark {
            width: 38px;
            height: 38px;
            border: 1px solid var(--rule);
            background: var(--panel);
            display: grid;
            place-items: center;
            color: var(--clay-dark);
            font: 800 18px ui-sans-serif, system-ui
        }

        .brand h1 {
            margin: 0;
            font: 850 22px/1.15 ui-sans-serif, system-ui, "PingFang SC", sans-serif
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px
        }

        .search input {
            width: 100%;
            border: 1px solid var(--rule);
            padding: 10px 12px;
            outline: none
        }

        .search input:focus {
            border-color: var(--clay);
            box-shadow: 0 0 0 3px rgba(164, 95, 67, .12)
        }

        .chips,
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .chips {
            margin: 14px 0
        }

        .btn,
        .chip {
            border: 1px solid var(--rule);
            background: #fff;
            color: var(--ink);
            padding: 8px 10px;
            min-height: 38px;
            font: 750 13px/1 ui-sans-serif, system-ui, "PingFang SC", sans-serif
        }

        .btn.primary,
        .chip.active {
            background: var(--ink);
            border-color: var(--ink);
            color: #fff
        }

        .btn:hover,
        .chip:hover {
            border-color: var(--clay)
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0
        }

        .stat {
            border: 1px solid var(--soft);
            background: var(--panel);
            padding: 10px
        }

        .stat strong {
            display: block;
            font: 850 20px/1 ui-sans-serif, system-ui
        }

        .stat span {
            color: var(--muted);
            font-size: 12px
        }

        .list {
            display: grid;
            gap: 6px;
            border-top: 1px solid var(--soft);
            padding-top: 12px
        }

        .qbtn {
            border: 0;
            background: transparent;
            text-align: left;
            padding: 9px 6px;
            display: grid;
            grid-template-columns: 54px 1fr auto;
            gap: 8px;
            align-items: start;
            color: var(--ink)
        }

        .qbtn:hover {
            background: var(--panel)
        }

        .qbtn.active {
            background: var(--warm)
        }

        .qnum {
            font: 800 13px/1.5 ui-sans-serif, system-ui;
            color: var(--clay-dark)
        }

        .qtext {
            font-size: 14px;
            line-height: 1.45
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--rule);
            padding: 2px 6px;
            color: var(--muted);
            background: #fff;
            font: 800 12px/1 ui-sans-serif, system-ui;
            white-space: nowrap
        }

        .pill.multi,
        .pill.single {
            color: #7c3f2e
        }

        .pill.judge {
            color: #3f7454
        }

        .pill.blank {
            color: #a16a21
        }

        .pill.ok {
            color: var(--ok);
            border-color: rgba(63, 116, 84, .35)
        }

        .pill.bad {
            color: var(--bad);
            border-color: rgba(164, 68, 56, .35)
        }

        .main {
            padding: 30px clamp(22px, 5vw, 64px) 48px
        }

        .top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--soft);
            padding-bottom: 16px;
            margin-bottom: 28px;
            color: var(--muted);
            font: 650 14px ui-sans-serif, system-ui
        }

        .progress {
            min-width: 240px;
            flex: 1;
            max-width: 420px
        }

        .pline {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px
        }

        .track {
            height: 8px;
            background: var(--panel);
            border: 1px solid var(--soft)
        }

        .fill {
            height: 100%;
            width: 0;
            background: var(--clay);
            transition: .2s
        }

        .card {
            max-width: 980px;
            margin: auto
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px
        }

        .stem {
            margin: 0 0 16px;
            font: 850 clamp(23px, 3.4vw, 34px)/1.32 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
            color: var(--clay-dark);
            letter-spacing: 0
        }

        .hint {
            color: var(--muted);
            font: 650 14px ui-sans-serif, system-ui;
            margin-bottom: 14px
        }

        .options {
            display: grid;
            gap: 10px;
            margin: 18px 0
        }

        .opt {
            border: 1px solid var(--rule);
            background: #fff;
            padding: 13px 14px;
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 10px;
            align-items: start;
            text-align: left;
            color: var(--ink)
        }

        .opt .key {
            font: 850 16px/1.6 ui-sans-serif, system-ui;
            color: var(--clay-dark)
        }

        .opt.selected {
            background: var(--warm);
            border-color: var(--clay)
        }

        .opt.correct {
            background: rgba(63, 116, 84, .09);
            border-color: rgba(63, 116, 84, .55)
        }

        .opt.wrong {
            background: rgba(164, 68, 56, .08);
            border-color: rgba(164, 68, 56, .55)
        }

        .blankInput {
            width: 100%;
            border: 1px solid var(--rule);
            padding: 14px;
            outline: none;
            font-size: 18px
        }

        .blankInput:focus {
            border-color: var(--clay);
            box-shadow: 0 0 0 3px rgba(164, 95, 67, .12)
        }

        .panel {
            border: 1px solid var(--rule);
            background: var(--panel);
            box-shadow: var(--shadow);
            padding: 18px;
            margin-top: 18px
        }

        .result {
            display: none
        }

        .result.show {
            display: block
        }

        .result h3 {
            margin: 0 0 8px;
            font: 850 20px ui-sans-serif, system-ui
        }

        .result.ok h3 {
            color: var(--ok)
        }

        .result.bad h3 {
            color: var(--bad)
        }

        .answer {
            font-size: 18px
        }

        .source {
            margin-top: 8px;
            color: var(--muted);
            font: 650 14px ui-sans-serif, system-ui
        }

        .footerActions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 18px
        }

        .empty {
            border: 1px solid var(--rule);
            background: var(--panel);
            padding: 20px
        }

        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: var(--ink);
            color: #fff;
            padding: 10px 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: .2s;
            font: 650 13px ui-sans-serif, system-ui
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        @media(max-width:900px) {
            .app {
                grid-template-columns: 1fr
            }

            .side {
                position: relative;
                height: auto;
                border-right: 0;
                border-bottom: 1px solid var(--soft)
            }

            .main {
                padding: 22px 18px 42px
            }

            .top {
                flex-direction: column
            }

            .progress {
                max-width: none;
                width: 100%
            }

            .qbtn {
                grid-template-columns: 48px 1fr auto
            }

            .stem {
                font-size: 25px
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="side">
            <div class="brand">
                <div class="mark">题</div>
                <div>
                    <h1>习概刷题助手</h1>
                    <p>310 题 · 单选 137 · 多选 112 · 填空 30 · 判断 31</p>
                </div>
            </div>
            <div class="search"><input id="search" placeholder="搜索题干、选项、答案或出处"></div>
            <div class="chips"><button class="chip active" data-filter="all">全部</button><button class="chip"
                    data-filter="single">单选</button><button class="chip" data-filter="multi">多选</button><button
                    class="chip" data-filter="blank">填空</button><button class="chip"
                    data-filter="judge">判断</button><button class="chip" data-filter="wrong">错题</button></div>
            <div class="actions"><button class="btn primary" id="randomAll">随机</button><button class="btn"
                    id="randomWrong">抽错题</button><button class="btn" id="reset">重置</button></div>
            <div class="stats">
                <div class="stat"><strong id="statDone">0</strong><span>已做</span></div>
                <div class="stat"><strong id="statWrong">0</strong><span>错题</span></div>
                <div class="stat"><strong id="statRate">-</strong><span>正确率</span></div>
            </div>
            <div id="qlist" class="list"></div>
        </aside>
        <main class="main">
            <div class="top">
                <div>最终 310 题统一题库。答案区会显示教材页码或权威网页来源。</div>
                <div class="progress">
                    <div class="pline"><span>进度 <b id="ptext">0/0</b></span><span id="ppct">0%</span></div>
                    <div class="track">
                        <div id="pfill" class="fill"></div>
                    </div>
                </div>
            </div>
            <article id="card" class="card"></article>
        </main>
    </div>
    <div id="toast" class="toast"></div>

        function needMulti(x) { return x.type === 'multi' }
        function isChoice(x) { return x.type === 'multi' || x.type === 'single' || x.type === 'judge' }
        function filtered() { let s = query.trim().toLowerCase(); return QUESTIONS.filter(x => { if (filter !== 'all') { if (filter === 'wrong') { if (!state.wrong[x.id]) return false } else if (x.type !== filter) return false } if (s) { let hay = [x.typeName, x.num, x.stem, x.answer, x.answerDetail, x.source, ...x.options.map(o => o.text)].join(' ').toLowerCase(); if (!hay.includes(s)) return false } return true }) }
        function renderStats() { let done = Object.keys(state.done || {}).length, wrong = Object.keys(state.wrong || {}).length, total = QUESTIONS.length; $('#statDone').textContent = done; $('#statWrong').textContent = wrong; $('#statRate').textContent = done ? Math.max(0, Math.round((done - wrong) / done * 100)) + '%' : '-'; $('#ptext').textContent = `${done}/${total}`; $('#ppct').textContent = Math.round(done / total * 100) + '%'; $('#pfill').style.width = Math.round(done / total * 100) + '%' }
        function renderList() { let fs = filtered(); let box = $('#qlist'); box.innerHTML = ''; fs.forEach(x => { let b = document.createElement('button'); b.className = 'qbtn ' + (x.id === selectedId ? 'active' : ''); b.type = 'button'; b.innerHTML = `<span class="qnum">${x.num}</span><span class="qtext">${esc(x.stem)}</span><span class="pill ${state.wrong[x.id] ? 'bad' : state.done[x.id] ? 'ok' : x.type}">${state.wrong[x.id] ? '错题' : state.done[x.id] ? '已做' : x.typeName.replace('题', '')}</span>`; b.onclick = () => select(x.id); box.appendChild(b) }); if (!fs.length) box.innerHTML = '<div class="empty">没有匹配的题目。</div>' }
        function select(id) { selectedId = id; state.last = id; save(); chosen = []; checked = false; blankText = ''; render() }
        function renderMain() { let x = currentQuestion(); if (!x) { $('#card').innerHTML = '<div class="empty">没有题目。</div>'; return } let done = !!state.done[x.id], wrong = !!state.wrong[x.id]; $('#card').innerHTML = `<div class="meta"><span class="pill ${x.type}">${x.typeName}</span><span class="pill">第 ${x.num} 题</span>${done ? `<span class="pill ${wrong ? 'bad' : 'ok'}">${wrong ? '错题' : '已做'}</span>` : ''}<span class="pill">${esc(x.source)}</span></div><h2 class="stem">${esc(x.stem)}</h2><div class="hint">${x.type === 'multi' ? '多选题，可选择多个答案。' : x.type === 'single' ? '单选题，只能选择一个答案。' : x.type === 'judge' ? '判断题，选择“是/正确”或“否/错误”。' : '填空题，输入答案后核对。'}</div>${renderAnswerArea(x)}<div class="footerActions"><button class="btn primary" id="checkBtn">判题</button><button class="btn" id="showBtn">看答案</button><button class="btn" id="nextBtn">下一题</button><button class="btn" id="randBtn">随机</button></div><section id="result" class="panel result"><h3></h3><div class="answer"></div><div class="source"></div></section>`; bindMain(x); if (checked) showResult(x, score(x), false) }
        function renderAnswerArea(x) { if (isChoice(x)) { return `<div class="options">${x.options.map(o => `<button type="button" class="opt ${chosen.includes(o.key) ? 'selected' : ''}" data-key="${o.key}"><span class="key">${o.key}</span><span>${esc(o.text)}</span></button>`).join('')}</div>` } return `<input class="blankInput" id="blankInput" value="${esc(blankText)}" placeholder="在这里输入答案，然后判题或看答案">` }
        function bindMain(x) { $$('.opt').forEach(btn => btn.onclick = () => { let k = btn.dataset.key; if (checked) return; if (needMulti(x)) { chosen = chosen.includes(k) ? chosen.filter(v => v !== k) : [...chosen, k] } else { chosen = [k] } renderMain() }); let bi = $('#blankInput'); if (bi) bi.oninput = e => blankText = e.target.value; $('#checkBtn').onclick = () => { let ok = score(x); checked = true; state.done[x.id] = Date.now(); if (ok) delete state.wrong[x.id]; else state.wrong[x.id] = Date.now(); save(); render(); showResult(currentQuestion(), ok, true) }; $('#showBtn').onclick = () => { checked = true; showResult(x, null, true) }; $('#nextBtn').onclick = next; $('#randBtn').onclick = () => randomPick('current') }
        function score(x) { if (isChoice(x)) { let a = [...x.answerKeys].sort().join(''); let c = [...chosen].sort().join(''); return a === c } let clean = s => String(s).replace(/\s|,|，|、|。|；|;/g, '').toLowerCase(); let user = clean(blankText); let ans = clean(x.answer); return !!user && (ans === user || ans.includes(user) || user.includes(ans)) }
        function showResult(x, ok, markOptions) { let r = $('#result'); if (!r) return; r.className = 'panel result show ' + (ok === true ? 'ok' : ok === false ? 'bad' : ''); r.querySelector('h3').textContent = ok === true ? '答对了' : ok === false ? '还差一点' : '参考答案'; r.querySelector('.answer').innerHTML = `<div>正确答案：<strong>${esc(x.answerDetail || x.answer)}</strong></div>${isChoice(x) ? `<div style="margin-top:6px;color:var(--muted)">你的选择：${chosen.length ? esc([...chosen].sort().join(', ')) : '未选择'}</div>` : ''}`; r.querySelector('.source').innerHTML = `出处：${esc(x.source)}`; if (markOptions && isChoice(x)) $$('.opt').forEach(btn => { let k = btn.dataset.key; if (x.answerKeys.includes(k)) btn.classList.add('correct'); else if (chosen.includes(k)) btn.classList.add('wrong') }) }
        function next() { let arr = filtered(); if (!arr.length) return toast('没有可切换的题目'); let idx = arr.findIndex(x => x.id === selectedId); select((arr[idx + 1] || arr[0]).id) }
        function randomPick(mode) { let arr = mode === 'current' ? filtered() : QUESTIONS; if (!arr.length) return toast('没有可抽题目'); select(arr[Math.floor(Math.random() * arr.length)].id); toast('已随机抽题') }
        function render() { syncSelection(); renderStats(); renderList(); renderMain() }
        function toast(t) { let el = $('#toast'); el.textContent = t; el.classList.add('show'); clearTimeout(window.tt); window.tt = setTimeout(() => el.classList.remove('show'), 1300) }
        function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c])) }
        function init() { $('#search').oninput = e => { query = e.target.value; render() }; $$('[data-filter]').forEach(b => b.onclick = () => { filter = b.dataset.filter; $$('[data-filter]').forEach(x => x.classList.toggle('active', x === b)); render() }); $('#randomAll').onclick = () => randomPick('all'); $('#randomWrong').onclick = () => { let arr = QUESTIONS.filter(x => state.wrong[x.id]); if (!arr.length) return toast('暂无错题'); select(arr[Math.floor(Math.random() * arr.length)].id) }; $('#reset').onclick = () => { if (confirm('确定清空刷题记录和错题吗?')) { state = { done: {}, wrong: {}, last: selectedId }; save(); render(); toast('已重置') } }; render() }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
